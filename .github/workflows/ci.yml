name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  test-and-build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"
          cache: true

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Build
        run: go build ./...

  coverage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"
          cache: true

      - name: Measure Coverage
        shell: bash
        run: |
          set -euo pipefail
          go test ./internal/game -coverprofile=coverage.out -covermode=atomic
          COVERAGE=$(go tool cover -func=coverage.out | awk '/^total:/ {gsub("%","",$3); print $3}')
          if [ -z "${COVERAGE}" ]; then
            echo "Failed to parse coverage from coverage.out"
            go tool cover -func=coverage.out
            exit 1
          fi
          echo "Coverage: ${COVERAGE}%"
          THRESHOLD=80
          awk -v c="$COVERAGE" -v t="$THRESHOLD" 'BEGIN { exit !(c+0 >= t+0) }'
