<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Snake 3D</title>
  <style>
    :root {
      --bg-a: #08131e;
      --bg-b: #14273b;
      --panel: rgba(7, 18, 31, 0.72);
      --panel-2: rgba(10, 24, 40, 0.9);
      --line: rgba(141, 199, 255, 0.18);
      --text: #e9f5ff;
      --muted: #a8bfd3;
      --accent: #4ec0ff;
      --accent-2: #8fff9e;
      --danger: #ff7c68;
      --shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
      --status-h: 84px;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      height: 100%;
      font-family: "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(78, 192, 255, 0.15), transparent 30%),
        linear-gradient(180deg, var(--bg-b), var(--bg-a));
    }

    body {
      overflow: hidden;
    }

    #app {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    #scene {
      width: 100%;
      height: 100%;
      display: block;
    }

    .status-bar {
      background: var(--panel);
      backdrop-filter: blur(16px);
      border: 1px solid var(--line);
      border-radius: 18px;
      box-shadow: var(--shadow);
      position: absolute;
      inset: 18px 18px auto 18px;
      min-height: var(--status-h);
      padding: 10px 14px;
      display: grid;
      grid-template-columns: 150px minmax(0, 1fr);
      gap: 12px;
      align-items: start;
      pointer-events: none;
    }

    .brand {
      display: grid;
      gap: 1px;
      align-content: center;
      min-height: 100%;
    }

    .brand h1 {
      margin: 0;
      font-size: 18px;
      letter-spacing: 0.08em;
    }

    .brand span {
      color: var(--muted);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 6px 10px;
      font-size: 12px;
      align-content: center;
      min-height: 100%;
    }

    .stat {
      display: flex;
      align-items: baseline;
      gap: 6px;
      white-space: nowrap;
    }

    .stat strong {
      display: inline;
      color: var(--muted);
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin: 0;
    }

    .overlay {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: min(560px, calc(100% - 40px));
      padding: 26px 24px 22px;
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 28px;
      box-shadow: var(--shadow);
      pointer-events: auto;
    }

    .overlay.hidden {
      display: none;
    }

    .overlay h2 {
      margin: 0 0 8px;
      font-size: 34px;
      letter-spacing: 0.02em;
    }

    .overlay p {
      margin: 0;
      color: var(--muted);
      line-height: 1.45;
      font-size: 18px;
    }

    .controls {
      margin-top: 18px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
    }

    button,
    select {
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.06);
      color: var(--text);
      padding: 14px 18px;
      font: inherit;
      min-height: 56px;
    }

    button {
      cursor: pointer;
    }

    button.primary {
      background: linear-gradient(135deg, var(--accent), #2970ff);
      border: none;
    }

    .status {
      color: var(--accent-2);
      font-size: 13px;
    }

    .status.error {
      color: var(--danger);
    }

    .overlay-row {
      display: grid;
      grid-template-columns: 1.2fr 1fr;
      gap: 22px;
      align-items: start;
    }

    .overlay-side {
      display: grid;
      gap: 10px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.45;
    }

    .keyline {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 6px;
    }

    .keycap {
      padding: 8px 10px;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.04);
      color: var(--text);
      font-size: 12px;
      letter-spacing: 0.04em;
    }

    @media (max-width: 1100px) {
      .status-bar {
        grid-template-columns: 1fr;
      }

      .stats-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 820px) {
      .overlay {
        width: calc(100% - 24px);
        padding: 20px 18px 18px;
      }

      .overlay h2 {
        font-size: 28px;
      }

      .overlay p {
        font-size: 16px;
      }

      .overlay-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <canvas id="scene"></canvas>
    <section class="status-bar">
      <div class="brand">
        <h1>Snake 3D</h1>
        <span>Three.js Prototype</span>
      </div>
      <div class="stats-grid" id="stats-grid"></div>
    </section>

    <section class="overlay" id="overlay">
      <h2 id="overlay-title">Start a Run</h2>
      <div class="overlay-row">
        <div>
          <p id="overlay-copy">Pick a preset and press Start. The first movement key begins the run.</p>
          <div class="controls">
            <select id="preset-select"></select>
            <button class="primary" id="start-btn">Start</button>
            <button id="pause-btn">Pause</button>
            <button id="restart-btn">Restart</button>
          </div>
          <div class="controls">
            <span class="status" id="status-text">Connecting...</span>
          </div>
        </div>
        <aside class="overlay-side">
          <div>Use the keyboard to control the snake. The board stays fully visible while menus only appear when action is required.</div>
          <div class="keyline">
            <span class="keycap">WASD</span>
            <span class="keycap">Arrows</span>
            <span class="keycap">P Pause</span>
            <span class="keycap">R Restart</span>
          </div>
        </aside>
      </div>
    </section>
  </div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.174.0/build/three.module.js"
      }
    }
  </script>
  <script type="module" src="/app.js"></script>
</body>
</html>
